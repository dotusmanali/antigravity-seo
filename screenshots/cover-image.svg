<title>Antigravity SEO &amp; Blog Suite вҖ” AI-Powered Search &amp; Content Authority Engine</title>
<desc>OS-window banner. Sleek neon-themed title bar. Dark CRT terminal inside with ANTIGRAVITY SEO &amp; BLOG figlet logo in brand-neon cyan-to-purple vertical gradient, animated row-highlight scanner cycling through 7 /seo and /blog commands.</desc>

<defs>
  <style type="text/css"><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
    .ascii      { font-family: 'JetBrains Mono', 'Cascadia Mono', 'Menlo', monospace; font-size: 17px; font-weight: 700; fill: url(#neonGrad); }
