<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050811" />
      <stop offset="50%" stop-color="#090d1f" />
      <stop offset="100%" stop-color="#0c152b" />
    </linearGradient>

    <!-- Neon Accent Gradients -->
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="accent-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38ef7d" />
      <stop offset="100%" stop-color="#11998e" />
    </linearGradient>
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b224ef" />
      <stop offset="100%" stop-color="#7579ff" />
    </linearGradient>
    <linearGradient id="accent-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9900" />
      <stop offset="100%" stop-color="#ff5500" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif; font-weight: 900; font-size: 58px; fill: #ffffff; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 20px; fill: #94a3b8; letter-spacing: 0.5px; }
    .stat-val { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-weight: 800; font-size: 38px; fill: #ffffff; }
    .stat-lbl { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 14px; fill: #64748b; letter-spacing: 1px; text-transform: uppercase; }
    .feature-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 13px; fill: #cbd5e1; }
    .badge-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 12px; fill: #00f2fe; letter-spacing: 1px; }
  </style>

  <!-- Background -->
  <rect width="1200" height="450" fill="url(#bg-grad)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.05">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350 M 0,400 L 1200,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450 M 800,0 L 800,450 M 900,0 L 900,450 M 1000,0 L 1000,450 M 1100,0 L 1100,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Glowing Abstract Waves (Antigravity waves) -->
  <path d="M 750,450 Q 820,280 950,220 T 1150,50" fill="none" stroke="url(#accent-cyan)" stroke-width="8" opacity="0.4" filter="url(#glow-cyan)" />
  <path d="M 800,450 Q 900,250 1020,180 T 1200,20" fill="none" stroke="url(#accent-green)" stroke-width="4" opacity="0.6" filter="url(#glow-green)" />
  <path d="M 720,450 Q 860,320 900,150 T 1100,-50" fill="none" stroke="url(#accent-purple)" stroke-width="3" opacity="0.3" />

  <!-- Decorative Orbiting Spheres -->
  <circle cx="950" cy="220" r="30" fill="url(#bg-grad)" stroke="url(#accent-cyan)" stroke-width="3" filter="url(#glow-cyan)" opacity="0.9" />
  <circle cx="1020" cy="180" r="12" fill="url(#accent-green)" opacity="0.8" />
  <circle cx="900" cy="150" r="8" fill="url(#accent-purple)" opacity="0.6" />
  <circle cx="1120" cy="80" r="18" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4" />

  <!-- Left Side Content -->
  
  <!-- Platform Badge -->
  <rect x="80" y="65" width="180" height="28" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" />
  <circle cx="95" cy="79" r="5" fill="#00f2fe" filter="url(#glow-cyan)" />
  <text x="110" y="83" class="badge-text">GEMINI &amp; ANTIGRAVITY</text>

  <!-- Title -->
  <text x="80" y="150" class="title">ANTIGRAVITY SEO</text>
  <!-- Subtitle -->
  <text x="80" y="190" class="subtitle">Autonomous SEO Audit &amp; Optimization Skill Suite</text>

  <!-- Stats Grid -->
  <g transform="translate(80, 240)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="160" height="90" rx="12" fill="#0b1329" stroke="#1e293b" stroke-width="1" />
    <path d="M 0,12 L 0,78" stroke="url(#accent-cyan)" stroke-width="4" stroke-linecap="round" />
    <text x="20" y="45" class="stat-val">26</text>
    <text x="20" y="68" class="stat-lbl">Workflows</text>

    <!-- Stat 2 -->
    <rect x="180" y="0" width="160" height="90" rx="12" fill="#0b1329" stroke="#1e293b" stroke-width="1" />
    <path d="M 180,12 L 180,78" stroke="url(#accent-green)" stroke-width="4" stroke-linecap="round" />
    <text x="200" y="45" class="stat-val">24</text>
    <text x="200" y="68" class="stat-lbl">AI Agents</text>

    <!-- Stat 3 -->
    <rect x="360" y="0" width="160" height="90" rx="12" fill="#0b1329" stroke="#1e293b" stroke-width="1" />
    <path d="M 360,12 L 360,78" stroke="url(#accent-purple)" stroke-width="4" stroke-linecap="round" />
    <text x="380" y="45" class="stat-val">1</text>
    <text x="380" y="68" class="stat-lbl">Orchestrator</text>
  </g>

  <!-- Feature list (Bullet points) -->
  <g transform="translate(80, 365)">
    <!-- Feature 1 -->
    <circle cx="10" cy="-5" r="3" fill="#38ef7d" />
    <text x="22" y="0" class="feature-text">Technical SEO &amp; Schema</text>

    <!-- Feature 2 -->
    <circle cx="230" cy="-5" r="3" fill="#38ef7d" />
    <text x="242" y="0" class="feature-text">GEO / AI Citation Readiness</text>

    <!-- Feature 3 -->
    <circle cx="490" cy="-5" r="3" fill="#38ef7d" />
    <text x="502" y="0" class="feature-text">Local Maps &amp; E-Commerce</text>

    <!-- Feature 4 -->
    <circle cx="730" cy="-5" r="3" fill="#38ef7d" />
    <text x="742" y="0" class="feature-text">Drift &amp; Speed Monitoring</text>
  </g>
</svg>
