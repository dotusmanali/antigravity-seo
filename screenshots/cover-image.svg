    .sysline    { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #6D5E8C; letter-spacing: 1.8px; }
    .sysline-accent { fill: #00F2FE; }
    .hud        { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #00F2FE; letter-spacing: 1.6px; }
    .hud-muted  { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #5A5D7A; letter-spacing: 1.6px; }
    .cmd        { font-family: 'JetBrains Mono', monospace; font-size: 30px; fill: #5A5D7A; letter-spacing: 0.5px; }
    .cmd-active { fill: #F5F4ED; }
    .cmd-slash  { fill: #00F2FE; }
    .cmd-arg    { fill: #8B5CF6; opacity: 0.7; }
    .cmd-head   { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #00F2FE; letter-spacing: 2px; opacity: 0.75; }
    .cmd-head-b { fill: #8B5CF6; }
    .accent-line{ fill: url(#neonGradLine); }
    .live-dot   { fill: #00F2FE; }
    .win-title  { font-family: 'JetBrains Mono', monospace; font-size: 15px; fill: #A5B4FC; font-weight: 600; }
  ]]></style>

  <linearGradient id="neonGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#00F2FE"/>
    <stop offset="35%"  stop-color="#8B5CF6"/>
    <stop offset="70%"  stop-color="#D946EF"/>
    <stop offset="100%" stop-color="#3B0764"/>
    <animate attributeName="y1" values="0;0.3;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="1;0.7;1" dur="6s" repeatCount="indefinite"/>
  </linearGradient>

  <linearGradient id="neonGradLine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#00F2FE"/>
    <stop offset="50%"  stop-color="#8B5CF6"/>
    <stop offset="100%" stop-color="#D946EF"/>
  </linearGradient>

  <pattern id="scanlines" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
    <rect width="3" height="2" fill="transparent"/>
    <rect x="0" y="2" width="3" height="1" fill="rgba(0,0,0,0.25)"/>
  </pattern>
